<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов и Чат</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 24px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h2 { 
            margin-top: 0; 
            font-size: 1.3rem; 
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Блок Сессии (Картинка 1) */
        .user-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .timer-container {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2b78e4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .timer-icon { font-size: 1.6rem; }

        .btn-main {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 12px;
            margin-bottom: 12px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .btn-stop { background-color: #dc3545; }
        .session-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn-pause { background-color: #ffc107; color: black; }
        .btn-exit { background-color: #6c757d; }

        /* Блок статусов (Картинка 2) */
        .status-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-status {
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-study { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: black; }
        .btn-game { background-color: #17a2b8; }
        .btn-home { background-color: #6c757d; }

        /* Список группы */
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
            text-align: left;
        }
        .user-info-left {
            display: flex;
            align-items: center;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
        }
        .user-status-right {
            font-size: 0.85rem;
            color: #666;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .chat-box {
            background-color: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 10px;
            height: 180px;
            overflow-y: auto;
            padding: 12px;
            text-align: left;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        .chat-message {
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .chat-input-container {
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 0.95rem;
        }
        .btn-send {
            background-color: #2ecc71;
            border: none;
            color: white;
            padding: 0 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="card">
        <div class="user-name" id="userNameTitle">Загрузка...</div>
        <div class="timer-container">
            <span class="timer-icon">⏱️</span>
            <span id="timerDisplay">0 сек.</span>
        </div>
        
        <button class="btn-main btn-stop">⛔ Завершить сессию</button>
        <div class="session-actions">
            <button class="btn-pause">☕ Перерыв</button>
            <button class="btn-exit">Выход</button>
        </div>
    </div>

    <div class="card">
        <h2>Установить статус</h2>
        <div class="status-buttons">
            <button class="btn-status btn-study" onclick="changeStatus('Учусь', '#28a745')">📚 Учусь</button>
            <button class="btn-status btn-coffee" onclick="changeStatus('Кофе', '#ffc107')">☕ Кофе</button>
            <button class="btn-status btn-game" onclick="changeStatus('В игре', '#17a2b8')">🎮 В игре</button>
            <button class="btn-status btn-home" onclick="changeStatus('Дома', '#6c757d')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2>👥 Монитор группы</h2>
        <div id="grouplist"></div>
    </div>

    <div class="card">
        <h2>💬 Общий чат</h2>
        <div class="chat-box" id="chatBox">Загрузка сообщений...</div>
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение..." onkeypress="handleKeyPress(event)">
            <button class="btn-send" id="btnSend">➤</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://enkhcfubkyncpfndzsjr.supabase.co';
        const KEY = 'sb_publishable_kdI1Tj2bSK1f4ZG9WUVp9Q_4frIHtkf';
        const supabase = createClient(URL, KEY);

        const MY_ID = '38314be8-676e-4127-8301-702199a07ff1';
        let currentUsername = 'Аноним';

        // Логика Таймера
        let seconds = 23; // Стартовое значение как на макете
        const timerDisplay = document.getElementById('timerDisplay');
        setInterval(() => {
            seconds++;
            timerDisplay.innerText = `${seconds} сек.`;
        }, 1000);

        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка обновления статуса!");
                console.error(error);
            } else {
                fetchGroup();
            }
        };

        // Загрузка участников группы
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);

            const list = document.getElementById('grouplist');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="user-info-left">
                        <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                        <strong>${user.username}</strong>
                    </div>
                    <div class="user-status-right">
                        <span>🏠 ${user.status || 'Нет статуса'}</span>
                        <small style="color: #aaa; font-size: 10px;">⏱️ 0ч 0м 0с</small>
                    </div>
                </div>
            `).join('');

            const me = data.find(u => u.id === MY_ID);
            if (me) {
                currentUsername = me.username;
                document.getElementById('userNameTitle').innerText = me.username;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            const { error } = await supabase
                .from('messages')
                .insert([{ username: currentUsername, text: text }]);

            if (error) {
                console.error("Ошибка отправки:", error);
            } else {
                input.value = '';
                fetchMessages();
            }
        }

        async function fetchMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);

            if (error) return console.error(error);

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = data.map(msg => `
                <div class="chat-message">
                    <strong>${msg.username}:</strong> ${msg.text}
                </div>
            `).join('');
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.handleKeyPress = (event) => {
            if (event.key === 'Enter') {
                sendMessage();
            }
        };

        document.getElementById('btnSend').addEventListener('click', sendMessage);

        fetchGroup();
        fetchMessages();
        setInterval(() => {
            fetchGroup();
            fetchMessages();
        }, 3000);
    </script>
</body>
</html>
